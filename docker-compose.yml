version: '3.9'

services:

  mongodb:
    image: mongo:7
    container_name: bv-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: brownie_vibes
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD","mongosh","--eval","db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bv-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGO_URL: mongodb://mongodb:27017
      DB_NAME: ${DB_NAME:-brownie_vibes}
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
      OWNER_USERNAME: ${OWNER_USERNAME:-monisha}
      OWNER_PASSWORD: ${OWNER_PASSWORD:-brownievibes@2025}
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bv-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mongo_data:
    name: brownie_vibes_mongo
